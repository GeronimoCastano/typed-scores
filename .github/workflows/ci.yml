name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.2
      - name: Install PDF rasterizer
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Build the renderer used by regression tests
        run: ./build.sh
      - name: Compare rendered notation against the approved baseline
        run: scripts/test-rendering.sh
      - name: Verify parser, diagnostics, documents, and package
        run: scripts/verify-release.sh
